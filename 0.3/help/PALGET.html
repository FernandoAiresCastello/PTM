<html>
	<head>
		<link rel='stylesheet' href='styles.css'>
	</head>
	<body>
		<div class='command-name'>PALGET</div>
		<div class='command-description'>Get RGB value of color at palette index</div>
		
		<div class='syntax-header'>Syntax:</div>
		<div class='syntax'>
			<div class='syntax-format'>PALGET var, palette_index</div>
			<div class='syntax-description'>
				Get RGB value of color at palette index and store it in the given variable
			</div>
			<ul class='syntax-params'>
				<li>var = Variable identifier.</li>
				<li>palette_index = Palette index to alter</li>
			</ul>
		</div>
	</body>
</html>
