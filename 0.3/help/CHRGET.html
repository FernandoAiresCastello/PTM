<html>
	<head>
		<link rel='stylesheet' href='styles.css'>
	</head>
	<body>
		<div class='command-name'>CHRGET</div>
		<div class='command-description'>Get pixel pattern of character at charset index</div>
		
		<div class='syntax-header'>Syntax:</div>
		
		<div class='syntax'>
			<div class='syntax-format'>CHRGET var, charset_index</div>
			<div class='syntax-description'>
				Get pixel pattern of character at charset index and store it in the given variable
			</div>
			<ul class='syntax-params'>
				<li>var = Variable identifier.</li>
				<li>charset_index = Charset index</li>
			</ul>
		</div>

	</body>
</html>
